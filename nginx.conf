user  root;
worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # 心情 API 速率限制
    limit_req_zone $binary_remote_addr zone=mood_api:10m rate=2r/s;

    sendfile        on;
    keepalive_timeout  65;

    # ==================== test.wxuann.top（新博客） ====================
    server {
        listen 80;
        server_name test.wxuann.top;

        client_max_body_size 1m;

        location /api/mood {
            limit_req zone=mood_api burst=3 nodelay;
            limit_req_status 429;

            proxy_pass http://127.0.0.1:4321;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://127.0.0.1:4321;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ==================== wxuann.top ====================
    server {
        listen 80;
        server_name wxuann.top;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name wxuann.top;

        ssl_certificate "/root/ssl/root/fullchain.crt";
        ssl_certificate_key "/root/ssl/root/private.pem";
        ssl_session_timeout 5m;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        location / {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Credentials' 'true';
            add_header 'Access-Control-Allow-Headers' '*';
            add_header 'Access-Control-Allow-Methods' '*';
            add_header 'Access-Control-Expose-Headers' '*';
            root /var/www/homepage/dist;
            index index.html index.htm;
            try_files $uri $uri/ /index.html;

            error_page 400 402 403 404 /40x.html;
            location = /40x.html {
                root html;
            }

            location /css/ {
                root /var/www/homepage/dist/assets/css/;
            }
        }
    }

    # ==================== blog.wxuann.top ====================
    server {
        listen 443 ssl;
        server_name blog.wxuann.top;

        ssl_certificate "/root/ssl/fullchain.crt";
        ssl_certificate_key "/root/ssl/private.pem";
        ssl_session_timeout 5m;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        error_page 497 =307 https://$host$request_uri;

        location / {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://127.0.0.1:8091;
        }
    }

    # ==================== tzs.wxuann.top ====================
    server {
        listen 80;
        server_name tzs.wxuann.top;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name tzs.wxuann.top;

        ssl_certificate "/root/ssl/fullchain.crt";
        ssl_certificate_key "/root/ssl/private.pem";
        ssl_session_timeout 5m;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        location / {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Credentials' 'true';
            add_header 'Access-Control-Allow-Headers' '*';
            add_header 'Access-Control-Allow-Methods' '*';
            add_header 'Access-Control-Expose-Headers' '*';
            root /root/tzs;
            index index.html index.htm;
            try_files $uri $uri/ /index.html;

            error_page 400 402 403 404 /40x.html;
            location = /40x.html {
                root html;
            }
        }
    }

    # ==================== lib.wxuann.top ====================
    server {
        listen 443 ssl;
        server_name lib.wxuann.top;

        ssl_certificate "/root/ssl/fullchain.crt";
        ssl_certificate_key "/root/ssl/private.pem";
        ssl_session_timeout 5m;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        error_page 497 =307 https://$host$request_uri;

        location / {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://127.0.0.1:5244;
        }
    }
}